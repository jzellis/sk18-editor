<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="key1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#5c35cc"/>
    </linearGradient>
    <linearGradient id="key2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00b0cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Device body -->
  <rect x="8" y="8" width="240" height="240" rx="28" ry="28" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="28" ry="28" fill="none" stroke="#3a3a5c" stroke-width="2"/>

  <!-- 6x3 key grid, centered -->
  <!-- Row 0 -->
  <rect x="20" y="40" width="34" height="34" rx="7" fill="url(#key1)" filter="url(#glow)" opacity="0.9"/>
  <rect x="60" y="40" width="34" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>
  <rect x="100" y="40" width="34" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>
  <rect x="140" y="40" width="34" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>
  <rect x="180" y="40" width="34" height="34" rx="7" fill="url(#key2)" filter="url(#glow)" opacity="0.9"/>
  <rect x="220" y="40" width="16" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="20" y="82" width="34" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>
  <rect x="60" y="82" width="34" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>
  <rect x="100" y="82" width="34" height="34" rx="7" fill="url(#key1)" opacity="0.6"/>
  <rect x="140" y="82" width="34" height="34" rx="7" fill="url(#key1)" opacity="0.6"/>
  <rect x="180" y="82" width="34" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>
  <rect x="220" y="82" width="16" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>

  <!-- Row 2 -->
  <rect x="20" y="124" width="34" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>
  <rect x="60" y="124" width="34" height="34" rx="7" fill="url(#key2)" opacity="0.6"/>
  <rect x="100" y="124" width="34" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>
  <rect x="140" y="124" width="34" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>
  <rect x="180" y="124" width="34" height="34" rx="7" fill="url(#key2)" opacity="0.6"/>
  <rect x="220" y="124" width="16" height="34" rx="7" fill="#22223b" stroke="#3a3a5c" stroke-width="1"/>

  <!-- Label -->
  <text x="128" y="194" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-weight="700" font-size="22" fill="#00e5ff" letter-spacing="3">SK18</text>
  <text x="128" y="216" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-weight="400" font-size="11" fill="#7c4dff" letter-spacing="1.5">EDITOR</text>

  <!-- Accent dots -->
  <circle cx="128" cy="236" r="3" fill="#7c4dff" opacity="0.8"/>
  <circle cx="118" cy="236" r="2" fill="#7c4dff" opacity="0.4"/>
  <circle cx="138" cy="236" r="2" fill="#7c4dff" opacity="0.4"/>
</svg>
